<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel - Aon Thonglor 7</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { margin:0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; background:#f5f5f5; text-align:center; }
        .header-img { width:100%; height:220px; object-fit:cover; background:#000; }
        .box { background:white; margin:-20px auto 40px; padding:25px; border-radius:20px; max-width:420px; box-shadow:0 10px 30px rgba(0,0,0,0.1); }
        h2 { margin-top:0; font-size:22px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .section { margin-bottom: 20px; text-align: left; background: #fafafa; padding: 15px; border-radius: 12px; border: 1px solid #eee; }
        .section-title { font-size: 14px; color: #555; font-weight: bold; margin-bottom: 10px; }
        
        /* Input & Select */
        .price-group { display: flex; align-items: center; background: white; border: 1px solid #ccc; border-radius: 10px; overflow: hidden; }
        .price-group input { width: 60%; border: none; padding: 12px; font-size: 18px; text-align: right; outline: none; }
        .price-group .fixed-unit { width: 40%; background: #eee; padding: 12px; font-size: 18px; color: #666; border-left: 1px solid #ccc; font-weight: bold; }
        select { width: 100%; padding: 12px; font-size: 16px; border: 1px solid #ccc; border-radius: 10px; background: white; margin-bottom: 10px; }
        
        /* Buttons */
        .btn { width:100%; padding:14px; font-size:16px; font-weight: bold; border:none; border-radius:10px; cursor: pointer; margin-top: 5px; transition: 0.2s; }
        .primary { background:black; color:white; }
        .danger { background: #d32f2f; color: white; }
        .line-btn { background: #06C755; color: white; margin-bottom: 10px; text-decoration: none; display: block; text-align: center; line-height: 1.4; }
        
        /* Door Button Special */
        .door-btn { height: 80px; font-size: 20px; text-shadow: 0 2px 4px rgba(0,0,0,0.3); box-shadow: 0 4px 15px rgba(211,47,47,0.4); background: linear-gradient(to bottom, #ff4d4d, #d32f2f); }
        .door-btn:active { transform: scale(0.98); box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
    </style>
</head>
<body>

<img src="building.PNG" class="header-img" alt="Aon Thonglor 7">

<div class="box">
    <h2>Admin Control Panel</h2>

    <div class="section">
        <div class="section-title">1. ตั้งค่าราคาห้องพัก (บาท)</div>
        <div class="price-group">
            <input type="number" id="basePrice" placeholder="เช่น 1200" step="1">
            <div class="fixed-unit">.XX</div>
        </div>
        <button class="btn primary" onclick="updatePrice()">💾 บันทึกราคาลง Sheets</button>
    </div>

    <div class="section" style="background: #fff0f0; border: 2px solid #ffcccc;">
        <div class="section-title" style="color: #d32f2f;">2. ระบบควบคุมประตู (Door Access)</div>
        <button id="doorBtn" class="btn danger door-btn" onclick="openDoor()">🔓 กดเปิดประตูหน้าบ้าน</button>
        <div id="doorStatus" style="font-size: 12px; color: #888; margin-top: 10px; text-align: center;">สถานะ: พร้อมสั่งการ</div>
    </div>

    <div class="section">
        <div class="section-title">3. จัดการคิวจองห้องพัก</div>
        <select id="bookingList">
            <option value="">กำลังโหลดคิวจอง...</option>
        </select>
        <button class="btn danger" onclick="cancelBooking()">❌ ยกเลิกการจองนี้</button>
    </div>

    <div class="section">
        <div class="section-title">4. แจ้งเตือนทีมงาน (LINE)</div>
        <a href="https://line.me/R/msg/text/?แจ้งงานแม่บ้าน: รบกวนทำความสะอาดห้องพักด้วยค่ะ" class="btn line-btn">🧹 เรียกแม่บ้าน</a>
        <a href="https://line.me/R/msg/text/?แจ้งงานผ้า: ส่งซักผ้าเช็ดตัวและเครื่องนอนค่ะ" class="btn line-btn">🧺 ส่งซักผ้า</a>
    </div>
</div>

<script>
// --- ลิงก์ Apps Script ของบอส ---
const DOOR_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzJhox9gLYjK2KqQMk78bHUVsK6gU8CAOJiTtQeadNhCfCIkHUJDoGw_RS7P70m-VCh/exec";
const ADMIN_SHEET_URL = "https://script.google.com/macros/s/AKfycbxH7We7B-LdO6zwQ30LPgOxHIRmv0907-At52vBUtutkaNUBZHNs0XlW7oZMGSnkVCq/exec";

// 🔓 ฟังก์ชันเปิดประตู
async function openDoor() {
    const btn = document.getElementById("doorBtn");
    const status = document.getElementById("doorStatus");
    
    if(!confirm("ยืนยันเปิดประตูหน้าบ้านใช่ไหมคะบอส?")) return;

    btn.disabled = true;
    btn.style.opacity = "0.6";
    status.innerText = "⏳ กำลังส่งสัญญาณไปที่ Sonoff...";

    try {
        await fetch(DOOR_SCRIPT_URL, { mode: 'no-cors' });
        status.innerText = "✅ สำเร็จ! ประตูเปิดแล้ว (Inching 0.5s)";
        status.style.color = "#2e7d32";
        
        setTimeout(() => {
            status.innerText = "สถานะ: พร้อมสั่งการ";
            status.style.color = "#888";
            btn.disabled = false;
            btn.style.opacity = "1";
        }, 5000);
    } catch (e) {
        alert("ผิดพลาด: " + e);
        btn.disabled = false;
        btn.style.opacity = "1";
    }
}

// 💾 ฟังก์ชันอัปเดตราคา
function updatePrice() {
    const price = document.getElementById("basePrice").value;
    if(!price || price < 1) { alert("ใส่ราคาด้วยค่ะบอส!"); return; }
    
    statusNotify("กำลังบันทึกราคา " + price + "...");
    // ส่วนนี้เดี๋ยวรอเชื่อมกับ Apps Script ฝั่ง Sheets ค่ะ
    alert("ระบบกำลังส่งราคา " + price + " ไปยัง Google Sheets ค่ะ");
}

function cancelBooking() {
    const selected = document.getElementById("bookingList").value;
    if(!selected) { alert("เลือกคิวก่อนค่ะ!"); return; }
    if(confirm("ยกเลิกคิวนี้ชัวร์นะบอส?")) {
        alert("กำลังลบคิวออกจากระบบ...");
    }
}

function statusNotify(msg) {
    console.log(msg);
}
</script>

</body>
</html>
