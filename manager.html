<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
// 1. ฟังก์ชันเปิดประตู (ของเดิมบอสโอเคแล้ว แต่เจนนี่จูนให้สมูทขึ้น)
async function openDoor() {
    const btn = document.getElementById("doorBtn");
    const status = document.getElementById("doorStatus");
    
    const result = await Swal.fire({
        title: 'ยืนยันเปิดประตู?',
        text: "บอสกำลังจะสั่งปลดล็อกประตูหน้าบ้านนะคะ",
        icon: 'warning',
        showCancelButton: true,
        confirmButtonColor: '#800',
        cancelButtonColor: '#333',
        confirmButtonText: 'ใช่, เปิดเลย!',
        cancelButtonText: 'ยกเลิก',
        background: '#111',
        color: '#fff'
    });

    if (!result.isConfirmed) return;

    btn.disabled = true;
    status.innerText = "⏳ SENDING SIGNAL...";
    status.style.color = "#ff9100";

    try {
        await fetch(`${API_URL}?action=openDoor`, { mode: 'no-cors' });
        status.innerText = "✅ SUCCESS! DOOR OPENED";
        status.style.color = "#8fce00";
        
        setTimeout(() => {
            status.innerText = "STATUS: READY";
            status.style.color = "#666";
            btn.disabled = false;
        }, 5000);
    } catch (e) {
        Swal.fire({ title: 'Error!', text: e, icon: 'error', background:'#111', color:'#fff' });
        btn.disabled = false;
    }
}

// 2. ฟังก์ชันแก้ไขราคา (จุดที่เคยลักไก่ คราวนี้ส่งจริง!)
async function updatePrice() {
    const price = document.getElementById("basePrice").value;
    
    if(!price || price < 1) {
        Swal.fire({ title: 'ราคาไม่ถูกต้อง!', text: 'กรุณาใส่ตัวเลขราคาด้วยค่ะบอส', icon: 'error', background:'#111', color:'#fff' });
        return;
    }

    // แสดงสถานะว่ากำลังส่งข้อมูล
    Swal.fire({
        title: 'กำลังบันทึก...',
        text: 'เตารีดเจนนี่กำลังนาบราคาลง Sheets ค่ะ',
        allowOutsideClick: false,
        didOpen: () => { Swal.showLoading(); },
        background: '#111',
        color: '#fff'
    });

    try {
        // ยิง API ของจริงไปที่ Google Sheets (Action: updatePrice)
        const response = await fetch(`${API_URL}?action=updatePrice&price=${price}`);
        const result = await response.text();

        Swal.fire({
            title: 'สำเร็จ!',
            text: `ปรับราคาที่ทองหล่อ 7 เป็น ${price} บาท เรียบร้อยแล้วค่ะ!`,
            icon: 'success',
            background: '#111',
            color: '#fff'
        });
        
        // ล้างราคาเก่าในเครื่องเพื่อให้หน้า Index ดึงใหม่
        localStorage.removeItem("latest_price");

    } catch (error) {
        Swal.fire({
            title: 'บันทึกไม่สำเร็จ!',
            text: 'ตรวจสอบเน็ตหรือ API_URL ใน config.js นะคะบอส',
            icon: 'error',
            background: '#111',
            color: '#fff'
        });
    }
}
</script>
