<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Book Room - Aon Thonglor 7</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f2f2f2;
margin:0;
text-align:center;
}

/* รูปด้านบน */

.hero img{
width:100%;
max-height:300px;
object-fit:cover;
}

/* ส่วนหัว */

.header{
padding:25px;
}

.header h1{
font-size:32px;
margin:10px 0;
}

.price{
font-size:26px;
font-weight:bold;
margin-bottom:10px;
}

/* กล่องจอง */

.container{
max-width:420px;
margin:auto;
background:white;
padding:25px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
margin-bottom:40px;
}

input{
width:100%;
padding:14px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

/* ปุ่ม */

button{
width:100%;
padding:16px;
margin-top:15px;
border:none;
border-radius:14px;
background:black;
color:white;
font-size:18px;
font-weight:600;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

.status{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<!-- รูป -->

<div class="hero">
<img src="room2.PNG">
</div>

<!-- หัว -->

<div class="header">

<h1>Aon Thonglor 7</h1>

<div class="price">
1500 THB / Night
</div>

</div>

<!-- ฟอร์มจอง -->

<div class="container">

<input type="date" id="checkin">
<input type="date" id="checkout">

<input type="text" id="name" placeholder="Your Name">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="line" placeholder="LINE ID">

<button onclick="bookRoom()">Confirm Booking</button>

<div class="status" id="status"></div>

</div>

<script>

const api="https://script.google.com/macros/s/AKfycbyxeDGAOHYKrp7SxKj2ST356D2IQ1K0kKbV6yxtOri3wCYJrVHe2y5c9EhycKV_iDRU/exec";

function bookRoom(){

let checkin=document.getElementById("checkin").value;
let checkout=document.getElementById("checkout").value;
let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let line=document.getElementById("line").value;

if(!checkin || !checkout || !name){
document.getElementById("status").innerHTML="Please fill required fields";
return;
}

fetch(api,{
method:"POST",
body:JSON.stringify({
checkin:checkin,
checkout:checkout,
name:name,
phone:phone,
line:line
})
})
.then(res=>res.text())
.then(data=>{

if(data=="FULL"){
document.getElementById("status").innerHTML="❌ Room Full";
}

if(data=="BOOKED"){
document.getElementById("status").innerHTML="✅ Booking Confirmed";
}

})
.catch(err=>{
document.getElementById("status").innerHTML="Error connecting server";
});

}

</script>

</body>
</html>
