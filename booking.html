<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book in Advance - Aon Thonglor 7</title>
<script src="config.js"></script>
<style>
/* ธีม OLED Black ประหยัดไฟไอโฟนพี่อ้น */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#000;color:#fff;text-align:center;}
.hero img{width:100%;height:300px;object-fit:cover;display:block;}
.booking-box{width:92%;max-width:520px;margin:-20px auto 30px auto;background:#111;padding:20px;border-radius:18px;border:1px solid #222;}
.date-row{display:flex;gap:10px;margin-bottom:10px;}
.date-field{flex:1;text-align:left;}
label{font-size:13px;font-weight:600;color:#888;display:block;margin-bottom:4px;}
input{width:100%;padding:14px;border-radius:12px;border:1px solid #333;background:#222;color:#fff;font-size:16px;box-sizing:border-box;outline:none;}
input::placeholder{color:#555;}
input[type="date"]{height:45px;padding:10px;font-size:14px;color-scheme:dark;}
.summary{margin-top:14px;background:#1a1a1a;padding:16px;border-radius:12px;display:flex;justify-content:space-between;align-items:center;font-size:18px;font-weight:600;border:1px solid #222;}
.input-group{margin-top:12px;}
/* ปุ่มขาวล่อนิ้วโป้งขวา */
button{width:100%;padding:18px;margin-top:20px;border:none;border-radius:14px;background:#fff;color:#000;font-size:18px;font-weight:bold;cursor:pointer;}
button:active{transform:scale(0.98);}
.back-link{display:block;margin-top:20px;color:#555;text-decoration:none;font-size:14px;}
</style>
</head>
<body>

<div class="hero">
<img src="room2.PNG" alt="Room"> </div>

<div class="booking-box">
  <h2 style="margin-top:0; font-size:22px;">Book in Advance / จองล่วงหน้า</h2>
  
  <div class="date-row">
    <div class="date-field">
      <label>Check-in / เช็คอิน</label>
      <input type="date" id="checkin">
    </div>
    <div class="date-field">
      <label>Check-out / เช็คเอาท์</label>
      <input type="date" id="checkout">
    </div>
  </div>

  <div class="summary">
    <div><span id="nights">1</span> Nights / คืน</div>
    <div style="color:#fff;"><span id="priceDisplay">0</span> THB</div>
  </div>

  <div class="input-group"><input type="text" placeholder="Name / ชื่อผู้จอง" id="name"></div>
  <div class="input-group"><input type="tel" placeholder="Phone / เบอร์โทรศัพท์" id="phone"></div>
  <div class="input-group"><input type="text" placeholder="LINE ID / ไอดีไลน์" id="line"></div>

  <button onclick="confirmBooking()">Book in Advance (จองล่วงหน้า)</button>
  <a href="index.html" class="back-link">Cancel / ยกเลิกกลับหน้าหลัก</a>
</div>

<script>
const checkinInput = document.getElementById("checkin");
const checkoutInput = document.getElementById("checkout");
const nightsText = document.getElementById("nights");
const priceText = document.getElementById("priceDisplay");

function formatDate(d){return d.toISOString().split('T')[0];}

// ดึงราคาล่าสุดจากเครื่องที่ซิงค์มาจากหน้าแรก
const basePrice = parseInt(localStorage.getItem("latest_price")) || 1500;

function updateSummary(){
  const start = new Date(checkinInput.value + "T00:00:00");
  const end = new Date(checkoutInput.value + "T00:00:00");
  let nights = Math.round((end-start)/(1000*60*60*24));
  if(nights < 1) nights = 1;
  nightsText.innerText = nights;
  priceText.innerText = (nights * basePrice).toLocaleString();
}

function confirmBooking(){
  const nameVal = document.getElementById("name").value.trim();
  const phoneVal = document.getElementById("phone").value.trim();
  const lineVal = document.getElementById("line").value.trim();

  if(!nameVal || !phoneVal || !lineVal) {
    alert("Please fill in all information\nกรุณากรอกข้อมูลให้ครบถ้วนค่ะ");
    return;
  }

  const bookingData = {
    checkin: checkinInput.value,
    checkout: checkoutInput.value,
    nights: nightsText.innerText,
    totalPrice: (parseInt(nightsText.innerText) * basePrice),
    name: nameVal,
    phone: phoneVal,
    line: lineVal,
    type: "Advance Booking",
    timestamp: new Date().toISOString()
  };

  localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
  window.location.href="payment.html";
}

// ตั้งค่าเริ่มต้น (พรุ่งนี้ - มะรืน)
const today = new Date();
const tomorrow = new Date(today); tomorrow.setDate(tomorrow.getDate()+1);
const dayAfter = new Date(tomorrow); dayAfter.setDate(dayAfter.getDate()+1);

checkinInput.value = formatDate(tomorrow);
checkoutInput.value = formatDate(dayAfter);
checkinInput.min = formatDate(tomorrow);
updateSummary();

checkinInput.addEventListener("change", () => {
  if (checkinInput.value >= checkoutInput.value) {
    let newOut = new Date(checkinInput.value);
    newOut.setDate(newOut.getDate() + 1);
    checkoutInput.value = formatDate(newOut);
  }
  updateSummary();
});
checkoutInput.addEventListener("change", updateSummary);
</script>
</body>
</html>
