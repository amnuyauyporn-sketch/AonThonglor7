<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Aon Thonglor 7 Booking</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f2f2f2;
margin:0;
text-align:center;
color:#222;
}

/* รูปด้านบน */

.hero img{
width:100%;
height:320px;
object-fit:cover;
}

/* ส่วนหัว */

.section{
padding:30px 20px 10px;
}

h1{
font-size:38px;
margin:10px 0;
font-weight:700;
}

.subtitle{
font-size:18px;
color:#777;
margin-bottom:18px;
}

.price{
font-size:32px;
font-weight:700;
margin-bottom:6px;
}

.checkin{
color:#777;
font-size:18px;
margin-bottom:15px;
}

.features{
font-size:17px;
color:#777;
margin-bottom:25px;
}

/* กล่อง booking */

.booking-box{
background:white;
width:90%;
max-width:420px;
margin:auto;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.08);
}

/* input */

input{
width:100%;
padding:16px;
margin:8px 0;
border-radius:12px;
border:1px solid #ddd;
font-size:16px;
}

/* ปุ่ม */

button{
width:100%;
padding:18px;
margin-top:14px;
border:none;
border-radius:16px;
background:black;
color:white;
font-size:20px;
font-weight:600;
}

.status{
margin-top:15px;
font-weight:600;
}

</style>

</head>

<body>

<!-- รูป -->

<div class="hero">
<img src="room1.PNG">
</div>

<!-- text -->

<div class="section">

<h1>Aon Thonglor 7</h1>

<div class="subtitle">
Boutique Room in Thonglor • Bangkok
</div>

<div class="price">
1500 THB / Night
</div>

<div class="checkin">
Self Check-in 24 Hours
</div>

<div class="features">
Free WiFi • Aircon • Hot Shower • Fridge • Microwave
</div>

</div>

<!-- booking -->

<div class="booking-box">

<input type="date" id="checkin">

<input type="date" id="checkout">

<input type="text" placeholder="Your Name">

<input type="text" placeholder="Phone">

<input type="text" placeholder="LINE ID">

<button>
Confirm Booking
</button>

<div class="status"></div>

</div>

<br><br>

</body>
</html>
