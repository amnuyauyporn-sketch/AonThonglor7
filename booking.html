<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Booking - Aon Thonglor 7</title>

<style>

body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#f2f2f2;
}

/* รูปด้านบน */

.hero img{
width:100%;
height:320px;
object-fit:cover;
display:block;
}

/* กล่อง booking */

.booking-box{

width:92%;
max-width:520px;

margin:-30px auto 60px auto;

background:white;

padding:25px;

border-radius:20px;

box-shadow:0 10px 25px rgba(0,0,0,0.08);

}

/* แถววันที่ */

.date-row{

display:flex;
gap:10px;

}

/* กล่องวันที่ */

.date-field{
flex:1;
}

/* label */

label{

font-size:14px;
font-weight:600;
color:#444;

display:block;

margin-top:10px;

}

/* input */

input{

width:100%;

padding:16px;

margin-top:6px;

border-radius:14px;
border:1px solid #ddd;

font-size:16px;

box-sizing:border-box;

background:#fafafa;

}

/* ช่องปฏิทิน */

input[type="date"]{

height:40px;

padding:6px 10px;

font-size:14px;

}

/* กล่องสรุป */

.summary{

margin-top:15px;

background:#f7f7f7;

padding:15px;

border-radius:12px;

font-size:15px;

}

/* ปุ่ม */

button{

width:100%;

padding:18px;

margin-top:18px;

border:none;

border-radius:16px;

background:black;
color:white;

font-size:18px;
font-weight:600;

}

</style>

</head>

<body>

<div class="hero">
<img src="room2.PNG">
</div>

<div class="booking-box">

<div class="date-row">

<div class="date-field">
<label>Check-in</label>
<input type="date" id="checkin">
</div>

<div class="date-field">
<label>Check-out</label>
<input type="date" id="checkout">
</div>

</div>

<div class="summary">
<div>Night: <span id="nights">0</span></div>
<div>Total Price: <span id="price">0</span> บาท</div>
</div>

<label>Your Name</label>
<input type="text" placeholder="Enter your name">

<label>Phone</label>
<input type="text" placeholder="Phone number">

<label>LINE ID</label>
<input type="text" placeholder="LINE ID">

<button>
Confirm Booking
</button>

</div>

<script>

const pricePerNight = 1500;

const checkin = document.getElementById("checkin");
const checkout = document.getElementById("checkout");

const nightsText = document.getElementById("nights");
const priceText = document.getElementById("price");

function calculate(){

const start = new Date(checkin.value);
const end = new Date(checkout.value);

if(checkin.value && checkout.value){

const diff = end - start;

const nights = diff / (1000*60*60*24);

if(nights > 0){

nightsText.innerText = nights;

priceText.innerText = nights * pricePerNight;

}

}

}

checkin.addEventListener("change",calculate);
checkout.addEventListener("change",calculate);

</script>

</body>
</html>
