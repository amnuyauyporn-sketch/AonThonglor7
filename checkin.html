<!DOCTYPE html>
<html>
<head>

<title>Check-in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

/* background */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('checkin2.PNG') center/cover no-repeat;
}

/* overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.25);
}

/* layout */
.container{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:40px 20px 80px;
}

/* card */
.card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:24px;
    padding:44px 28px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);

    min-height:320px;

    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* text */
h2{
    margin:0;
    text-align:center;
    font-size:24px;
}

p{
    text-align:center;
    color:#777;
    margin-top:10px;
}

/* button */
button{
    margin-top:36px;
    width:100%;
    padding:20px;
    border:none;
    border-radius:16px;
    background:black;
    color:white;
    font-size:18px;
}

/* loader */
.loader{
    border:4px solid #eee;
    border-top:4px solid black;
    border-radius:50%;
    width:50px;
    height:50px;
    margin:25px auto;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

/* success */
.success{
    display:none;
    text-align:center;
    font-size:18px;
    margin-top:15px;
}

/* note */
.note{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-top:14px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<div class="card">

<h2 id="title">Welcome</h2>

<p id="desc">Tap below to unlock the entrance</p>

<div class="loader" id="loader"></div>

<button id="btn" onclick="openDoor()">🔓 Unlock Entrance</button>

<div class="success" id="success">
Door Unlocked 🚪
</div>

<div class="note">Door will unlock for a few seconds</div>

</div>

</div>

<script>

function openDoor(){

    let btn = document.getElementById("btn");
    let loader = document.getElementById("loader");
    let title = document.getElementById("title");
    let desc = document.getElementById("desc");
    let success = document.getElementById("success");

    btn.disabled = true;
    btn.innerHTML = "Opening...";

    loader.style.display = "block";

    title.innerHTML = "Opening Door...";
    desc.innerHTML = "Please wait";

    // 🔥 ตรงนี้เอาไว้ยิง API เปิดประตูจริง
    setTimeout(function(){

        loader.style.display = "none";
        success.style.display = "block";

        title.innerHTML = "Welcome!";
        desc.innerHTML = "You may enter now";

        btn.style.display = "none";

    },2000);

}

</script>

</body>
</html>
