<!DOCTYPE html>
<html>
<head>

<title>Check-in</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>

body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
}

/* background */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('checkin2.PNG') center/cover no-repeat;
}

/* overlay */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(255,255,255,0.25);
}

/* layout */
.container{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:40px 20px 80px;
}

/* card */
.card{
    width:100%;
    max-width:420px;
    background:white;
    border-radius:24px;
    padding:30px 24px 30px;
    box-shadow:0 20px 40px rgba(0,0,0,0.15);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
}

/* Map Section */
.map-box {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
}

.map-box iframe {
    width: 100%;
    height: 180px;
    border: none;
    display: block;
}

.nav-btn {
    display: block;
    background: #f0f0f0;
    color: #333;
    text-align: center;
    padding: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    margin-top: 10px;
    border-radius: 12px;
}

/* text */
h2{
    margin:0;
    text-align:center;
    font-size:24px;
}

p{
    text-align:center;
    color:#777;
    margin-top:10px;
}

/* button */
.unlock-btn{
    margin-top:24px;
    width:100%;
    padding:20px;
    border:none;
    border-radius:16px;
    background:black;
    color:white;
    font-size:18px;
    cursor: pointer;
}

/* loader */
.loader{
    border:4px solid #eee;
    border-top:4px solid black;
    border-radius:50%;
    width:50px;
    height:50px;
    margin:25px auto;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

/* success */
.success{
    display:none;
    text-align:center;
    font-size:18px;
    margin-top:15px;
    font-weight: bold;
    color: #2e7d32;
}

/* note */
.note{
    text-align:center;
    font-size:13px;
    color:#aaa;
    margin-top:14px;
}

/* Line Contact */
.line-contact {
    display: block;
    text-align: center;
    margin-top: 24px;
    color: #06C755;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}

</style>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">

<div class="card">

    <div class="map-box">
        <iframe src="https://maps.google.com/maps?q=Thong+Lo+7&t=&z=15&ie=UTF8&iwloc=&output=embed"></iframe>
    </div>
    
    <a href="https://maps.app.goo.gl/XXXXXXX" target="_blank" class="nav-btn">📍 Open in Google Maps</a>

    <h2 id="title" style="margin-top: 20px;">Welcome</h2>
    <p id="desc">Tap below to unlock the entrance</p>

    <div class="loader" id="loader"></div>

    <button id="btn" class="unlock-btn" onclick="openDoor()">🔓 Unlock Entrance</button>

    <div class="success" id="success">
    Door Unlocked 🚪
    </div>
    <div class="note">Door will unlock for a few seconds</div>

    <a href="https://line.me/ti/p/~ใส่ไอดีไลน์ตรงนี้" target="_blank" class="line-contact">💬 Contact Admin via LINE</a>

</div>

</div>

<script>
function openDoor(){

    let btn = document.getElementById("btn");
    let loader = document.getElementById("loader");
    let title = document.getElementById("title");
    let desc = document.getElementById("desc");
    let success = document.getElementById("success");

    btn.disabled = true;
    btn.innerHTML = "Opening...";

    loader.style.display = "block";

    title.innerHTML = "Opening Door...";
    desc.innerHTML = "Please wait";

    // 🔥 รอเสียบ API ของ Sonoff ตรงนี้เมื่อของมาส่ง
    setTimeout(function(){

        loader.style.display = "none";
        success.style.display = "block";

        title.innerHTML = "Welcome!";
        desc.innerHTML = "You may enter now";

        btn.style.display = "none";

    },2000);
}
</script>

</body>
</html>
