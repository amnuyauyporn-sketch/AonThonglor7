<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check-in - Aon Thonglor 7</title>
<style>
/* ธีม OLED Black ประหยัดไฟพิกเซลปิดสนิท 100% */
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#000;
    color:#fff;
}

/* พื้นหลังรูป (ย้อมให้มืดเข้ากับธีมชั้น 5) */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('checkin2.PNG') center/cover no-repeat;
    filter: brightness(0.2); 
}

/* overlay ดำบางๆ */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
}

/* layout */
.container{
    position:relative;
    min-height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:40px 20px 80px;
}

/* card สีดำเข้มขลัง */
.card{
    width:100%;
    max-width:420px;
    background:#111;
    border-radius:24px;
    padding:30px 24px 30px;
    border:1px solid #222;
    box-shadow:0 20px 40px rgba(0,0,0,0.5);
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-sizing:border-box;
}

/* Map Section */
.map-box {
    width: 100%;
    border-radius: 16px;
    overflow: hidden;
    margin-bottom: 20px;
    border: 1px solid #333;
}

.map-box iframe {
    width: 100%;
    height: 180px;
    border: none;
    display: block;
}

.nav-btn {
    display: block;
    background: #222;
    color: #fff;
    text-align: center;
    padding: 12px;
    text-decoration: none;
    font-weight: 600;
    font-size: 14px;
    margin-top: 10px;
    border-radius: 12px;
    border: 1px solid #333;
}

/* text */
h2{
    margin:0;
    text-align:center;
    font-size:24px;
    letter-spacing:1px;
}

p{
    text-align:center;
    color:#888;
    margin-top:10px;
}

/* button ปลดล็อก (สีขาวเด่นล่อนิ้ว) */
.unlock-btn{
    margin-top:24px;
    width:100%;
    padding:20px;
    border:none;
    border-radius:16px;
    background:#fff;
    color:#000;
    font-size:18px;
    font-weight:bold;
    cursor: pointer;
    transition: 0.2s;
}
.unlock-btn:active { transform: scale(0.98); }

/* loader */
.loader{
    border:4px solid #222;
    border-top:4px solid #fff;
    border-radius:50%;
    width:50px;
    height:50px;
    margin:25px auto;
    animation:spin 1s linear infinite;
    display:none;
}

@keyframes spin{
    0%{ transform:rotate(0deg); }
    100%{ transform:rotate(360deg); }
}

/* success */
.success{
    display:none;
    text-align:center;
    font-size:18px;
    margin-top:15px;
    font-weight: bold;
    color: #8fce00;
}

/* note */
.note{
    text-align:center;
    font-size:13px;
    color:#444;
    margin-top:14px;
}

/* Line Contact */
.line-contact {
    display: block;
    text-align: center;
    margin-top: 24px;
    color: #06C755;
    text-decoration: none;
    font-weight: bold;
    font-size: 16px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
<div class="card">

    <div class="map-box">
        <iframe src="https://maps.google.com/maps?q=143/6%20Sing%20Waet%20Lom%20Alley%20Bangkok&z=17&output=embed"></iframe>
    </div>
    
    <a href="https://maps.google.com/maps?q=143/6%20Sing%20Waet%20Lom%20Alley%20Bangkok&z=17&output=embed" target="_blank" class="nav-btn">📍 Open in Google Maps / นำทาง</a>

    <h2 id="title" style="margin-top: 20px;">Welcome / ยินดีต้อนรับ</h2>
    <p id="desc">Tap below to unlock the entrance / กดเพื่อเปิดประตู</p>

    <div class="loader" id="loader"></div>

    <button id="btn" class="unlock-btn" onclick="openDoor()">🔓 Unlock Entrance (เปิดประตู)</button>

    <div class="success" id="success">
    Door Unlocked / ประตูเปิดแล้ว 🚪
    </div>
    <div class="note">Door will unlock for a few seconds / ประตูจะเปิดชั่วคราว</div>

    <a href="https://line.me/ti/p/~ใส่ไอดีไลน์ตรงนี้" target="_blank" class="line-contact">💬 Contact Admin via LINE (ติดต่อเจ้าของ)</a>

</div>
</div>

<script>
function openDoor(){
    let btn = document.getElementById("btn");
    let loader = document.getElementById("loader");
    let title = document.getElementById("title");
    let desc = document.getElementById("desc");
    let success = document.getElementById("success");

    btn.disabled = true;
    btn.innerHTML = "Opening... / กำลังเปิด...";

    loader.style.display = "block";
    title.innerHTML = "Opening Door...";
    desc.innerHTML = "Please wait / กรุณารอสักครู่";

    // 🔥 บอสเอา API Shelly / Sonoff มาเสียบตรงนี้ได้เลยค่ะเมื่อของมาส่ง!
    setTimeout(function(){
        loader.style.display = "none";
        success.style.display = "block";
        title.innerHTML = "Welcome! / เข้าพักได้เลยค่ะ";
        desc.innerHTML = "You may enter now";
        btn.style.display = "none";
    }, 2500);
}
</script>

</body>
</html>
