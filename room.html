<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { background-color: #000; color: #fff; font-family: sans-serif; padding: 25px; text-align: center; }
    .room-header { font-size: 3.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 10px rgba(128,0,128,0.5); }
    
    .nav-box { border: 1px solid #303; padding: 18px; border-radius: 15px; margin: 20px 0; background: #101; color: #e0b0ff; }
    .light-dot { display: inline-block; width: 12px; height: 12px; background: purple; border-radius: 50%; box-shadow: 0 0 10px purple; margin-right: 5px; }

    /* ชุดคุมแอร์ */
    .ac-control { background: #111; border: 1px solid #333; border-radius: 20px; padding: 20px; margin: 15px 0; }
    .temp-display { font-size: 4rem; font-weight: bold; color: #e0b0ff; margin: 5px 0; }
    .temp-btn-group { display: flex; justify-content: center; gap: 20px; margin-bottom: 20px; }
    .temp-btn { width: 65px; height: 65px; border-radius: 50%; border: 2px solid #e0b0ff; background: transparent; color: #e0b0ff; font-size: 2.5rem; cursor: pointer; }

    .btn { width: 100%; padding: 20px; margin: 10px 0; border: none; border-radius: 12px; font-size: 1.2rem; font-weight: bold; cursor: pointer; }
    .btn-door { background: #fff; color: #000; }
    
    /* ปุ่มเปิด-ปิดแอร์ แยกสีให้ชัด */
    .btn-ac-on { background: #e0b0ff; color: #000; } /* ม่วงสว่างคือเปิด */
    .btn-ac-off { background: #200; color: #f44; border: 1px solid #400; } /* แดงมืดคือปิด */
    
    label { display: block; margin-top: 25px; color: #444; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
  </style>
</head>
<body>

  <div class="room-header">ROOM 101</div>
  <div class="nav-box"><span class="light-dot"></span> เดินตามไฟสีม่วง</div>

  <button class="btn btn-door" onclick="send('openDoor')">OPEN MAIN DOOR</button>

  <label>Air Conditioning (Haier)</label>
  <div class="ac-control">
    <button class="btn btn-ac-on" onclick="send('airOn')">POWER ON</button>
    
    <div class="temp-display"><span id="temp">25</span>°C</div>
    <div class="temp-btn-group">
      <button class="temp-btn" onclick="changeTemp(-1)">−</button>
      <button class="temp-btn" onclick="changeTemp(1)">+</button>
    </div>
    
    <button class="btn btn-ac-off" onclick="send('airOff')">TURN OFF</button>
  </div>

  <label>Lighting</label>
  <button class="btn" style="background:#111; color:#fff; border:1px solid #333;" onclick="send('lightToggle')">LIGHT ON/OFF</button>

  <script>
    let currentTemp = 25;

    function changeTemp(val) {
      currentTemp += val;
      if(currentTemp < 18) currentTemp = 18;
      if(currentTemp > 30) currentTemp = 30;
      document.getElementById('temp').innerText = currentTemp;
      send('airSet' + currentTemp); 
    }

    function send(action) {
      const url = "URL_APPS_SCRIPT_ของพี่?room=101&action=" + action;
      fetch(url, { mode: 'no-cors' });
      console.log("Sent: " + action);
    }
  </script>
</body>
</html>
