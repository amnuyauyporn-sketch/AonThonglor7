<!DOCTYPE html>
<html>
<head>
<title>Aon Thonglor 7 - Payment</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background:#f5f5f5;
    text-align:center;
}

/* รูปหัว */
.header-img{
    width:100%;
    height:220px;
    object-fit:cover;
}

/* กล่องหลัก */
.box{
    background:white;
    margin:-40px auto 20px;
    padding:25px;
    border-radius:20px;
    max-width:420px;
    box-shadow:0 10px 30px rgba(0,0,0,0.1);
}

/* หัวข้อ */
h2{
    margin:10px 0;
}

/* สรุป */
.summary{
    text-align:left;
    margin:20px 0;
    font-size:14px;
    color:#555;
}

.summary strong{
    float:right;
    color:black;
}

/* QR */
.qr{
    width:240px;
    margin:20px auto;
}

/* ปุ่ม */
.btn{
    width:100%;
    padding:16px;
    font-size:18px;
    border:none;
    border-radius:12px;
    margin-top:10px;
}

/* ปุ่มหลัก */
.primary{
    background:black;
    color:white;
}

/* ปุ่มรอง */
.secondary{
    background:#eee;
}

/* timer */
.timer{
    margin-top:10px;
    color:red;
    font-size:14px;
}
</style>

</head>

<body>

<!-- รูปหัว -->
<img src="building.png" class="header-img">

<div class="box">

<h2>Aon Thonglor 7</h2>
<p>Secure Payment</p>

<!-- สรุป -->
<div class="summary">
    Check-in: <strong>20 Mar</strong><br><br>
    Check-out: <strong>21 Mar</strong><br><br>
    Nights: <strong>1</strong><br><br>
    Total: <strong>1,500 THB</strong>
</div>

<!-- QR -->
<img src="qr.png" class="qr">
<p>Scan to Pay (PromptPay)</p>

<div class="timer">Time left: 10:00</div>

<!-- ปุ่ม -->
<a href="checkin.html">
    <button class="btn primary">I've Paid</button>
</a>

<button class="btn secondary" onclick="location.reload()">
Refresh QR
</button>

</div>

</body>
</html>
