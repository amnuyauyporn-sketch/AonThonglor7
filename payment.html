<<script>
// 1. ดึงข้อมูลที่ส่งมาจากหน้า Index
const storedData = localStorage.getItem("pendingBooking");

if (storedData) {
    const bookingData = JSON.parse(storedData);
    
    // --- ลอจิกราคาของบอสอ้น (125 + เลขห้อง + . + วันที่) ---
    // ดึงวันที่เช็คอิน (เช่น 19)
    const checkinDate = new Date(bookingData.checkin).getDate();
    const dayStr = String(checkinDate).padStart(2, '0'); 
    
    // สมมติว่าเป็นห้อง 1 (หรือบอสจะแก้เป็นเลขอื่นตามต้องการ)
    const roomNum = "1"; 
    
    // รวมร่างราคา: 125 + 1 + . + 19 = 1251.19
    const finalPrice = "125" + roomNum + "." + dayStr;
    
    // 2. เจน QR Code อัตโนมัติ (ใส่เบอร์พร้อมเพย์บอสตรงนี้)
    const myPromptPay = "0907980860"; 
    const qrUrl = `https://promptpay.io/${myPromptPay}/${finalPrice}.png`;
    
    // 3. แสดงผลบนหน้าจอ (เช็ก ID ให้ตรงกับ HTML ของบอสด้วยนะ)
    if(document.getElementById("val-total")) document.getElementById("val-total").innerText = finalPrice + " THB";
    if(document.querySelector(".qr")) document.querySelector(".qr").src = qrUrl;

    // แปลงวันที่โชว์สวยๆ
    function formatDisplayDate(dateStr) {
        const months = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        const d = new Date(dateStr);
        return d.getDate() + " " + months[d.getMonth()];
    }
    
    if(document.getElementById("val-checkin")) document.getElementById("val-checkin").innerText = formatDisplayDate(bookingData.checkin);
    if(document.getElementById("val-checkout")) document.getElementById("val-checkout").innerText = formatDisplayDate(bookingData.checkout);
    if(document.getElementById("val-nights")) document.getElementById("val-nights").innerText = bookingData.nights;

    // อัปเดตข้อมูลกลับไปในเครื่อง เผื่อกดส่งแจ้งโอน
    bookingData.totalPrice = finalPrice;
    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));

    // --- ระบบนาฬิกานับถอยหลัง 10 นาที ---
    const bookingTime = new Date(bookingData.timestamp).getTime();
    const expireTime = bookingTime + (10 * 60 * 1000);
    const timerElement = document.getElementById("timer");
    
    if(timerElement) {
        let countdown = setInterval(function(){
            const now = new Date().getTime();
            const distance = expireTime - now;
            if(distance < 0){
                clearInterval(countdown);
                timerElement.innerHTML = "QR Expired";
                return;
            }
            let minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((distance % (1000 * 60)) / 1000);
            timerElement.innerHTML = "Time left: " + minutes + ":" + (seconds < 10 ? "0"+seconds : seconds);
        }, 1000);
    }
} else {
    // ถ้าไม่มีข้อมูล ให้เด้งกลับไปหน้าแรก
    window.location.href = "index.html";
}
</script>
