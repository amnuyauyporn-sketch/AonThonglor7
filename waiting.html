<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checking Payment - Thonglor 7</title>
<script src="config.js"></script>
<style>
/* ธีม OLED Black ประหยัดไฟพิกเซลปิดสนิท 100% */
body{
    margin:0;
    font-family:-apple-system, BlinkMacSystemFont, sans-serif;
    background:#000;
    color:#fff;
    overflow: hidden;
}

/* พื้นหลังรูปภาพ ย้อมให้มืดถนอมสายตา */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:url('checkin2.PNG') center/cover no-repeat;
    filter: brightness(0.2) grayscale(30%);
    z-index: -1;
}

.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.6);
    z-index: -1;
}

.container{
    min-height:100vh;
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding:40px 20px 80px;
    box-sizing: border-box;
}

/* card สีดำเข้มขรึม */
.card{
    width:100%;
    max-width:420px;
    background:#111;
    border-radius:24px;
    padding:44px 28px;
    border:1px solid #222;
    box-shadow:0 20px 40px rgba(0,0,0,0.8);
    min-height:320px;
    display:flex;
    flex-direction:column;
    justify-content:center;
}

h2{
    text-align:center;
    margin:0;
    font-size:22px;
    letter-spacing:1px;
}

p{
    text-align:center;
    color:#888;
    margin:15px 0;
    font-size:15px;
}

/* loader สีขาวลอยบนพื้นดำ */
.loader{
    border:3px solid #222;
    border-top:3px solid #fff;
    border-radius:50%;
    width:45px;
    height:45px;
    margin:20px auto;
    animation:spin 0.8s linear infinite;
}

@keyframes spin{
    0%{transform:rotate(0deg);}
    100%{transform:rotate(360deg);}
}

.note{
    text-align:center;
    font-size:12px;
    color:#444;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="container">
    <div class="card">
        <h2>Verifying...</h2>
        <p>กำลังบันทึกข้อมูลและตรวจสอบยอดโอน<br>กรุณารอสักครู่ค่ะ</p>
        
        <div class="loader"></div>
        
        <p class="note">กรุณาอย่าปิดหน้าต่างนี้จนกว่าจะเสร็จสิ้น<br>Do not close this page</p>
    </div>
</div>

<script>
// ตรวจสอบข้อมูลจาก LocalStorage
const storedData = localStorage.getItem("pendingBooking");

if (storedData) {
    const bookingData = JSON.parse(storedData);

    // 2. ยิงข้อมูลเข้า Google Sheets โดยใช้ API_URL จาก config.js
    // เจนนี่ใช้ mode: 'no-cors' ตามที่คุยกันเพื่อให้บันทึกได้ลื่นไหล
    fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(bookingData) 
    })
    .then(() => {
        // หน่วงเวลา 2.5 วินาทีเพื่อให้ดูเหมือนระบบกำลังประมวลผล (และให้ Sheets บันทึกเสร็จ)
        setTimeout(() => {
            console.log("บันทึกข้อมูลสำเร็จ!");
            window.location.href = "checkin.html";
        }, 2500);
    })
    .catch(error => {
        console.error("Error submitting data:", error);
        alert("เครือข่ายขัดข้อง กรุณาติดต่อบอสอ้นค่ะ");
        window.location.href = "index.html";
    });

} else {
    // ถ้าไม่มีข้อมูลจอง ให้ดีดกลับหน้าแรก
    window.location.href = "index.html";
}
</script>

</body>
</html>
