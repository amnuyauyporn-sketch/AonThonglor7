<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function fastCheckIn() {
  // --- ด่านกันนิ้วลั่น (สไตล์แวนเฮวซิ่ง: Yes ขวา / No ซ้ายแดง) ---
  const result = await Swal.fire({
    title: 'ต้องการเข้าพักคืนนี้เลยใช่ไหมคะ?',
    text: "ระบบจะตรวจสอบห้องว่างและพาคุณไปหน้าชำระเงินค่ะ",
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#000', // สีดำเข้มขลัง
    cancelButtonColor: '#dc3545',  // สีแดง (ซ้าย)
    confirmButtonText: 'ใช่, เข้าพักเลย!',
    cancelButtonText: 'ไม่ใช่, กดผิด',
    reverseButtons: true // ให้ Yes อยู่ขวา No อยู่ซ้าย
  });

  if (!result.isConfirmed) return; // ถ้ากด No หรือกดนอกหน้าต่าง ให้จบงาน ไม่ต้องไปต่อ

  const btn = document.getElementById('btnFastCheckin');
  btn.disabled = true;
  btn.innerText = "กำลังตรวจสอบห้องว่าง...";

  const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbxH7We7B-LdO6zwQ30LPgOxHIRmv0907-At52vBUtutkaNUBZHNs0XlW7oZMGSnkVCq/exec"; 

  try {
    const response = await fetch(googleAppsScriptURL);
    const data = await response.json(); 
    
    const today = new Date();
    const checkinStr = getLocalYYYYMMDD(today);
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    if(data.bookedDates && data.bookedDates.includes(checkinStr)) {
       Swal.fire('ขออภัยค่ะ', 'ห้องพักสำหรับคืนนี้เต็มแล้ว', 'error');
       btn.disabled = false;
       btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
       return; 
    }
    
    const currentPrice = data.price ? data.price : "1500";

    const bookingData = {
      checkin: checkinStr,
      checkout: getLocalYYYYMMDD(tomorrow),
      nights: 1,
      totalPrice: currentPrice,
      type: "Fast Check-in",
      timestamp: new Date().toISOString()
    };

    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
    
    // พุ่งไปหน้าจ่ายเงิน (ซึ่งจะมีตัวนับ 5 นาทีรออยู่)
    window.location.href = "payment.html";

  } catch (error) {
    console.error("Error:", error);
    Swal.fire('การเชื่อมต่อมีปัญหา', 'กรุณาลองใหม่อีกครั้งค่ะ', 'error');
    btn.disabled = false;
    btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
  }
}
</script>
