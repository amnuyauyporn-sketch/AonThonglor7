<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aon Thonglor 7 - Van Helsing Edition</title>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* --- ธีมดำขลับ สไตล์นักล่าปีศาจ --- */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;background:#000;text-align:center;color:#fff;} /* พื้นหลังดำ ตัวหนังสือขาว */
.hero img{width:100%;display:block;}
.container{padding:30px 20px 40px;background:#111;border-radius:30px 30px 0 0;margin-top:-30px;position:relative;} /* ตู้คอนเทนเนอร์สีดำเข้ม */
h1{font-size:36px;margin:10px 0 10px 0;}
.subtitle{color:#888;font-size:18px;} /* ซับไตเติ้ลสีเทาหม่น */
.price{font-size:28px;margin-top:18px;}
.checkin{color:#888;margin-bottom:10px;}
.facilities{color:#666;font-size:16px;margin-bottom:30px;line-height:1.6;} /* สิ่งอำนวยความสะดวกสีเทาแก่ */

/* ปรับสไตล์ปุ่มให้เหมือนกันทั้ง <a> และ <button> */
/* ปุ่ม Fast Check-in จ่อนิ้วโป้งขวา (Yes ตกลง) */
.button{display:block;background:#fff;color:#000;text-decoration:none;padding:18px;margin:12px auto;max-width:320px;border-radius:14px;font-size:18px;cursor:pointer;border:none;width:100%;box-sizing:border-box;font-weight:bold;}
.button:disabled {background:#444;color:#888;cursor:not-allowed;} /* ปุ่มโหลดสีเทา */

.map{margin-top:40px;border-radius:20px;overflow:hidden;}
iframe{width:100%;height:350px;border:0;filter: invert(90%) hue-rotate(180deg);} /* แผนที่โหมดมืด */
</style>
</head>
<body>

<div class="hero">
<img src="room.png" alt="Room"> </div>

<div class="container">

<h1>Aon Thonglor 7</h1>

<div class="subtitle">Boutique Room in Thonglor • Bangkok</div>
<div class="price">1500 THB / Night</div>
<div class="checkin">Self Check-in 24 Hours🛡️</div>
<div class="facilities">Free WiFi • Aircon • Hot Shower • Fridge • Microwave</div>

<button class="button" id="btnFastCheckin" onclick="confirmFastCheckIn()">Fast Check-in (เข้าพักวันนี้)</button>

<a class="button" href="booking.html">Book in Advance</a>

<div class="map">
<iframe src="http://googleusercontent.com/maps.google.com/3"></iframe>
</div>

</div>

<script>
function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

// ฟังก์ชันใหม่: ด่านกันนิ้วลั่น (Yes ขวา / No ซ้ายแดง)
async function confirmFastCheckIn() {
  const result = await Swal.fire({
    title: 'ยืนยันจองห้องพัก?',
    text: "คุณต้องการจองเพื่อเข้าพักทันทีใช่หรือไม่",
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#fff', // สีขาว (ขวา)
    cancelButtonColor: '#dc3545', // สีแดง (ซ้าย)
    confirmButtonText: 'Yes ตกลง', // แก้คำตามสั่งพี่แวนเฮวซิ่ง!
    cancelButtonText: 'No ยกเลิก',   // แก้คำตามสั่งพี่แวนเฮวซิ่ง!
    reverseButtons: true, // Yes อยู่ขวา ตามสั่ง!
    background: '#111', // ป๊อปอัพโหมดมืด
    color: '#fff'       // ตัวหนังสือสีขาว
  });

  if (result.isConfirmed) {
    fastCheckIn(); // ถ้าตกลงค่อยไปทำงานต่อ
  }
}

async function fastCheckIn() {
  const btn = document.getElementById('btnFastCheckin');
  btn.disabled = true;
  btn.innerText = "กำลังตรวจสอบห้องว่าง...";

  // URL ตัวล่าสุดที่บอสเพิ่งก๊อปมา
  const googleAppsScriptURL = "https://script.google.com/macros/s/AKfycbxH7We7B-LdO6zwQ30LPgOxHIRmv0907-At52vBUtutkaNUBZHNs0XlW7oZMGSnkVCq/exec"; 

  try {
    const response = await fetch(googleAppsScriptURL);
    const data = await response.json(); 
    
    const today = new Date();
    const checkinStr = getLocalYYYYMMDD(today);
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    // เช็กห้องว่างจาก data.bookedDates
    if(data.bookedDates && data.bookedDates.includes(checkinStr)) {
       Swal.fire({
            title: 'ห้องเต็มแล้วค่ะ',
            text: 'ขออภัยค่ะ คืนนี้มี...เอ้ย! มีแขกจองเต็มแล้ว',
            icon: 'error',
            confirmButtonColor: '#000'
        });
       btn.disabled = false;
       btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
       return; 
    }
    
    // ดึงราคาจาก Sheets (data.price) ถ้าไม่มีให้ใช้ 1500
    const currentPrice = data.price ? data.price : "1500";

    const bookingData = {
      checkin: checkinStr,
      checkout: getLocalYYYYMMDD(tomorrow),
      nights: 1,
      totalPrice: currentPrice,
      type: "Fast Check-in",
      timestamp: new Date().toISOString()
    };

    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
    
    // เด้งไปหน้าจ่ายเงิน
    window.location.href = "payment.html";

  } catch (error) {
    console.error("Error:", error);
    Swal.fire('การเชื่อมต่อมีปัญหา', 'กรุณาลองใหม่อีกครั้งค่ะ', 'error');
    btn.disabled = false;
    btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
  }
}
</script>

</body>
</html>
