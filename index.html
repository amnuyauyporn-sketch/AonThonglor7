<script>
// 1. วาง URL ของ Web App ที่ได้จาก Google Apps Script ที่นี่
const CONFIG_API_URL = "https://script.google.com/macros/s/AKfycbyhgz12OXm9jX9RaDS7Vaek6b63pMibw0bh4AyoAzO9oSMamasxTIBoIFCAjlTigZwZ/exec";

// ฟังก์ชันดึงราคาและวันที่จองจาก Google Sheets
async function syncRoomData() {
    const priceEl = document.getElementById("displayPrice");
    
    try {
        // เรียกใช้ action=getPrice ตามที่เขียนใน Apps Script
        const response = await fetch(`${CONFIG_API_URL}?action=getPrice`);
        const data = await response.json();
        
        if (data.status === "success" && data.price) {
            // แปลงเป็นตัวเลขและใส่คอมม่า พร้อมทศนิยม 2 ตำแหน่ง
            const numericPrice = parseFloat(data.price);
            const formattedPrice = numericPrice.toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
            
            priceEl.innerText = formattedPrice;
            
            // บันทึกค่าลง LocalStorage เผื่อเน็ตหลุดครั้งหน้า
            localStorage.setItem("latest_price", data.price);
            if (data.bookedDates) {
                localStorage.setItem("cached_booked_dates", JSON.stringify(data.bookedDates));
            }
        }
    } catch (error) {
        console.error("เชื่อมต่อ API ไม่ได้:", error);
        // ถ้าดึงไม่ได้ ให้ใช้ราคาล่าสุดที่เคยบันทึกไว้
        const saved = localStorage.getItem("latest_price");
        if (saved) {
            priceEl.innerText = parseFloat(saved).toLocaleString(undefined, {
                minimumFractionDigits: 2,
                maximumFractionDigits: 2
            });
        } else {
            priceEl.innerText = "1,251.21"; // ราคาสำรองกรณี error ครั้งแรก
        }
    }
}

// ฟังก์ชันแปลงวันที่เป็น YYYY-MM-DD
function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

// ระบบ Fast Check-in (จองวันนี้)
async function fastCheckIn() {
    const btn = document.getElementById('btnFastCheckin');
    btn.disabled = true;
    btn.innerHTML = "⏳ กำลังตรวจสอบ...";

    try {
        const response = await fetch(`${CONFIG_API_URL}?action=getPrice`);
        const data = await response.json();
        
        const today = new Date();
        const checkinStr = getLocalYYYYMMDD(today);
        
        // เช็คว่าวันนี้เต็มหรือยัง
        if (data.bookedDates && data.bookedDates.includes(checkinStr)) {
            Swal.fire({
                title: '❌ คืนนี้เต็มแล้ว',
                text: 'ขออภัยค่ะ มีผู้เข้าพักท่านอื่นจองตัดหน้าไปแล้ว',
                icon: 'error',
                background: '#111',
                color: '#fff'
            });
            btn.disabled = false;
            btn.innerHTML = "⚡ Fast Check-in (คืนนี้)";
            return;
        }

        // ถ้าว่าง ให้ไปหน้าชำระเงิน
        const currentPrice = data.price || "1251.21";
        const tomorrow = new Date(today);
        tomorrow.setDate(today.getDate() + 1);

        const bookingInfo = {
            checkin: checkinStr,
            checkout: getLocalYYYYMMDD(tomorrow),
            totalPrice: currentPrice,
            type: "Fast Check-in"
        };

        localStorage.setItem("pendingBooking", JSON.stringify(bookingInfo));
        // ส่งต่อไปยังหน้าชำระเงิน (ระบุชื่อไฟล์ให้ถูก)
        window.location.href = "payment.html";

    } catch (error) {
        Swal.fire({ title: 'เกิดข้อผิดพลาด', text: 'กรุณาลองใหม่อีกครั้ง', icon: 'error' });
        btn.disabled = false;
        btn.innerHTML = "⚡ Fast Check-in (คืนนี้)";
    }
}

// ผูกฟังก์ชันกับปุ่มเมื่อโหลดหน้าเว็บ
document.addEventListener('DOMContentLoaded', function() {
    syncRoomData();
    
    const btn = document.getElementById('btnFastCheckin');
    if (btn) {
        btn.addEventListener('click', () => {
            Swal.fire({
                title: 'ยืนยันเข้าพักคืนนี้?',
                text: "ระบบจะพาคุณไปหน้าชำระเงินทันที",
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: 'ตกลง',
                cancelButtonText: 'ยกเลิก',
                background: '#111',
                color: '#fff',
                confirmButtonColor: '#fff',
                confirmButtonTextColor: '#000'
            }).then((result) => {
                if (result.isConfirmed) fastCheckIn();
            });
        });
    }
});
</script>
