<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aon Thonglor 7 - Premium</title>
<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<style>
/* OLED Black ประหยัดไฟ iPhone 13 Pro Max ของบอสอ้น */
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:#000;text-align:center;color:#fff;}
.hero img{width:100%;display:block;height:300px;object-fit:cover;}
.container{padding:30px 20px 40px;background:#111;border-radius:30px 30px 0 0;margin-top:-30px;position:relative;border:1px solid #222;}
h1{font-size:36px;margin:10px 0;}
.subtitle{color:#888;font-size:18px;}
.price{font-size:28px;margin-top:18px;background:#222;padding:15px;border-radius:15px;border:1px dashed #444;display:inline-block;width:80%;}
.checkin{color:#888;margin:15px 0 10px 0;}
.facilities{color:#666;font-size:16px;margin-bottom:30px;line-height:1.6;}
.button{display:block;background:#fff;color:#000;text-decoration:none;padding:18px;margin:12px auto;max-width:320px;border-radius:14px;font-size:18px;cursor:pointer;border:none;width:100%;box-sizing:border-box;font-weight:bold;}
.button.secondary{background:#000;color:#444;border:1px solid #222;}
.button:disabled {background:#444;color:#888;cursor:not-allowed;}
.map{margin-top:40px;border-radius:20px;overflow:hidden;border:1px solid #333;}
</style>
</head>
<body>

<div class="hero"><img src="room.png" alt="Room"></div>

<div class="container">
    <h1>Aon Thonglor 7</h1>
    <div class="subtitle">Boutique Room in Thonglor • Bangkok</div>
    
    <div class="price">
        <span id="displayPrice">Loading...</span> THB / Night
    </div>
    
    <div class="checkin">Self Check-in 24 Hours 🛡️</div>
    <div class="facilities">Free WiFi • Aircon • Hot Shower • Fridge • Microwave</div>

    <button class="button" id="btnFastCheckin" onclick="confirmFastCheckIn()">Fast Check-in (เข้าพักวันนี้)</button>
    <a class="button secondary" href="booking.html">Book in Advance (จองล่วงหน้า)</a>

    <div class="map">
        <iframe 
            src="http://googleusercontent.com/maps.google.com/9" 
            width="100%" 
            height="350" 
            style="border:0;" 
            allowfullscreen="" 
            loading="lazy" 
            referrerpolicy="no-referrer-when-downgrade">
        </iframe>
    </div>
</div>

<script>
// 1. ฟังก์ชันซิงค์ราคา/รหัส X.xx ที่แม่นยำที่สุด
async function syncPrice() {
    try {
        // เพิ่ม Timestamp เพื่อป้องกัน Browser จำค่าเก่า (Anti-Cache)
        const response = await fetch(`${API_URL}?action=getPrice&t=${new Date().getTime()}`);
        const data = await response.json();
        
        if(data && data.price) {
            // โชว์ค่าดิบจาก Sheets ทันที (เช่น 1200.21) ไม่ต้องแปลง Number เพื่อให้ทศนิยมไม่หาย
            document.getElementById("displayPrice").innerText = data.price;
            localStorage.setItem("latest_price", data.price);
        }
    } catch (error) {
        // ถ้าดึงไม่สำเร็จ ให้ใช้ค่าล่าสุดที่เก็บไว้
        const savedPrice = localStorage.getItem("latest_price") || "1,500.00";
        document.getElementById("displayPrice").innerText = savedPrice;
    }
}

// รันทันทีที่เปิดหน้า
syncPrice();

function getLocalYYYYMMDD(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
}

async function confirmFastCheckIn() {
  const result = await Swal.fire({
    title: 'Confirm Booking?',
    text: "ต้องการเข้าพักวันนี้ใช่หรือไม่คะ?",
    icon: 'question',
    showCancelButton: true,
    confirmButtonColor: '#fff', 
    cancelButtonColor: '#dc3545', 
    confirmButtonText: 'Yes ตกลง', 
    cancelButtonText: 'No ยกเลิก',   
    reverseButtons: true, 
    background: '#111', 
    color: '#fff'       
  });
  if (result.isConfirmed) { fastCheckIn(); }
}

async function fastCheckIn() {
  const btn = document.getElementById('btnFastCheckin');
  btn.disabled = true;
  btn.innerText = "Checking...";
  try {
    const response = await fetch(`${API_URL}?action=getPrice`);
    const data = await response.json(); 
    const today = new Date();
    const checkinStr = getLocalYYYYMMDD(today);
    const tomorrow = new Date();
    tomorrow.setDate(today.getDate() + 1);

    if(data.bookedDates && data.bookedDates.includes(checkinStr)) {
       Swal.fire({ title: 'Full!', text: 'วันนี้ห้องเต็มแล้วค่ะ', icon: 'error', background:'#111', color:'#fff' });
       btn.disabled = false;
       btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
       return; 
    }
    
    const currentPrice = data.price || localStorage.getItem("latest_price") || "1500.00";
    const bookingData = {
      name: "Fast Guest",
      phone: "000-000-0000",
      line: "Fast-Checkin",
      checkin: checkinStr,
      checkout: getLocalYYYYMMDD(tomorrow),
      nights: 1,
      totalPrice: currentPrice,
      type: "Fast Check-in",
      timestamp: new Date().toISOString()
    };
    localStorage.setItem("pendingBooking", JSON.stringify(bookingData));
    window.location.href = "payment.html";
  } catch (error) {
    Swal.fire({ title: 'Error', text: 'เชื่อมต่อฐานข้อมูลไม่ได้ค่ะบอส', icon: 'error', background:'#111', color:'#fff' });
    btn.disabled = false;
    btn.innerText = "Fast Check-in (เข้าพักวันนี้)";
  }
}
</script>
</body>
</html>
